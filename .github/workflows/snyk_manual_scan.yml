name: Manual Snyk Scan

on:
  push:
      branches:
        - master
  workflow_dispatch:

jobs:
  snyk-scan:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore AdventOfCode2024/AdventOfCode2024.sln

      - name: Build
        run: dotnet build AdventOfCode2024/AdventOfCode2024.sln --configuration Release --no-restore

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Debug — show current directory
        run: pwd

      - name: Debug — list files
        run: ls -la

      - name: Snyk Open Source scan (SCA)
        run: |
          cd AdventOfCode2024/AdventOfCode2024
          snyk test --file=AdventOfCode2024.csproj

      - name: Snyk Code scan (SAST)
        run: snyk code test --no-cache
